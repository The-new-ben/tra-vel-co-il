name: Tra-Vel Theme Deploy

on:
  push:
    branches:
      - main
    paths:
      - "theme/tra-vel-v2/**"
      - "content/seo/**"
      - "plugin/tra-vel-deploy-gateway/**"
      - "scripts/ci/**"
      - "scripts/deploy/**"
      - ".github/workflows/deploy-theme.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Package and validate without updating WordPress
        required: true
        default: true
        type: boolean
      activate_theme:
        description: Reserved; protected auto-recovery deployments are upload-only
        required: true
        default: false
        type: boolean
      deployment_confirmation:
        description: For a real upload, enter DEPLOY TRA-VEL V2
        required: false
        default: ""
        type: string
      activation_confirmation:
        description: Reserved; activation is not accepted by this protected workflow
        required: false
        default: ""
        type: string

permissions:
  contents: read
  deployments: write

concurrency:
  group: tra-vel-production-theme
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out selected revision
        uses: actions/checkout@v7

      - name: Validate source
        shell: bash
        run: |
          set -euo pipefail
          node scripts/ci/validate-theme.mjs
          node scripts/ci/validate-theme-runtime.mjs
          node scripts/ci/validate-one-click-behavior.mjs
          node scripts/ci/validate-public-copy.mjs
          node scripts/ci/validate-discovery-contract.mjs
          node scripts/ci/validate-flight-search-contract.mjs
          node scripts/ci/validate-hotel-search-contract.mjs
          node scripts/ci/validate-insurance-quote-contract.mjs
          node scripts/ci/validate-trip-package-contract.mjs
          node scripts/ci/validate-traveler-workspace-contract.mjs
          node scripts/ci/validate-assisted-proposal-theme.mjs
          node scripts/ci/validate-supplier-handoff-contract.mjs
          node scripts/ci/validate-quote-case-theme.mjs
          node scripts/ci/validate-guide-packets.mjs
          node scripts/ci/validate-content-opportunity-registry.mjs
          node scripts/ci/validate-seo-opportunity-provisioning.mjs
          node scripts/ci/validate-assisted-proposal-release-contract.mjs
          node scripts/ci/validate-commercial-intent-contract.mjs
          node scripts/ci/validate-theme-deploy-contract.mjs
          python3 scripts/ci/verify_theme_preflight.py --requirements theme/tra-vel-v2/release-requirements.json --validate-only
          php scripts/ci/validate-supplier-runtime.php
          php scripts/ci/validate-flight-search-runtime.php
          php scripts/ci/validate-hotel-search-runtime.php
          php scripts/ci/validate-insurance-quote-runtime.php
          php scripts/ci/validate-trip-package-runtime.php
          php scripts/ci/validate-commercial-provenance-runtime.php
          php scripts/ci/validate-guide-publication-runtime.php
          php scripts/ci/validate-seo-opportunity-runtime.php
          php scripts/ci/validate-commercial-intent-runtime.php
          php scripts/ci/validate-traveler-workspace-runtime.php
          php scripts/ci/validate-supplier-handoff-runtime.php
          php scripts/ci/validate-home-hero-queue-runtime.php
          php scripts/ci/validate-open-meteo-adapter.php
          bash scripts/deploy/smoke-test.sh --validate-manifest
          node --check theme/tra-vel-v2/assets/js/app.js
          node --check theme/tra-vel-v2/assets/js/globe-3d.js
          while IFS= read -r -d '' file; do php -l "$file"; done < <(find theme/tra-vel-v2 plugin/tra-vel-deploy-gateway -type f -name '*.php' -print0)
          for file in scripts/ci/*.sh scripts/deploy/*.sh; do bash -n "$file"; done

      - name: Validate SEO provisioning contract
        shell: pwsh
        run: |
          [scriptblock]::Create((Get-Content -Raw scripts/wp/provision-seo-registry-pages.ps1)) | Out-Null
          & scripts/wp/provision-seo-registry-pages.ps1 -ContractTest

      - name: Build deployment artifact
        run: bash scripts/ci/build-theme.sh

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v7
        with:
          name: tra-vel-v2-deploy-${{ github.run_id }}
          path: dist/
          if-no-files-found: error
          retention-days: 90

  deploy:
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: ${{ github.event_name == 'workflow_dispatch' || vars.AUTO_DEPLOY_PRODUCTION == 'true' }}
    environment:
      name: production
      url: ${{ vars.WP_SITE_URL }}
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
      DEPLOYMENT_CONFIRMATION: ${{ github.event_name == 'workflow_dispatch' && inputs.deployment_confirmation || 'DEPLOY TRA-VEL V2' }}
      ACTIVATE_THEME: ${{ github.event_name == 'workflow_dispatch' && inputs.activate_theme || vars.ACTIVATE_THEME }}
      ACTIVATION_CONFIRMATION: ${{ github.event_name == 'workflow_dispatch' && inputs.activation_confirmation || '' }}
      DEPLOY_ENABLED: ${{ vars.DEPLOY_ENABLED }}
      WP_SITE_URL: ${{ vars.WP_SITE_URL }}
      SITE_URL: ${{ vars.WP_SITE_URL }}
      EXPECT_THEME_MARKER: ${{ vars.EXPECT_THEME_MARKER }}
      THEME_RELEASE_REQUIREMENTS_FILE: theme/tra-vel-v2/release-requirements.json
      THEME_DEPLOY_RESULT_FILE: theme-deploy-result.json
      THEME_DEPLOY_PRESTATE_FILE: theme-deploy-prestate.json
      REQUIRE_EXISTING_THEME: true
    steps:
      - name: Check out repository scripts
        uses: actions/checkout@v7

      - name: Download deployment artifact
        uses: actions/download-artifact@v8
        with:
          name: tra-vel-v2-deploy-${{ github.run_id }}
          path: dist

      - name: Verify artifact
        shell: bash
        run: |
          set -euo pipefail
          manifest_identity="$(python3 - <<'PY'
          import json
          import re
          data = json.load(open("dist/manifest.json", encoding="utf-8"))
          if data.get("theme") != "tra-vel-v2":
              raise SystemExit("Manifest contains an unexpected theme identity.")
          version = str(data.get("version", ""))
          sha256 = str(data.get("sha256", ""))
          archive = str(data.get("archive", ""))
          requirements = str(data.get("release_requirements", ""))
          requirements_sha256 = str(data.get("release_requirements_sha256", ""))
          seo_registry = str(data.get("seo_registry", ""))
          seo_registry_sha256 = str(data.get("seo_registry_sha256", ""))
          if not re.fullmatch(r"\d+\.\d+\.\d+(?:[-+][A-Za-z0-9.-]+)?", version):
              raise SystemExit("Manifest contains an invalid version.")
          if not re.fullmatch(r"[a-f0-9]{64}", sha256):
              raise SystemExit("Manifest contains an invalid SHA-256 digest.")
          if not re.fullmatch(r"tra-vel-v2-[A-Za-z0-9.+-]+-[a-f0-9]{7}\.zip", archive):
              raise SystemExit("Manifest contains an invalid archive name.")
          if requirements != "tra-vel-v2/release-requirements.json":
              raise SystemExit("Manifest contains an unexpected release-requirements path.")
          if not re.fullmatch(r"[a-f0-9]{64}", requirements_sha256):
              raise SystemExit("Manifest contains an invalid release-requirements digest.")
          if seo_registry != "tra-vel-v2/content/seo/content-opportunity-registry.json":
              raise SystemExit("Manifest contains an unexpected SEO registry path.")
          if not re.fullmatch(r"[a-f0-9]{64}", seo_registry_sha256):
              raise SystemExit("Manifest contains an invalid SEO registry digest.")
          print(f"{archive}|{version}|{sha256}|{requirements}|{requirements_sha256}|{seo_registry}|{seo_registry_sha256}")
          PY
          )"
          IFS='|' read -r manifest_archive manifest_version expected manifest_requirements expected_requirements_sha256 manifest_seo_registry expected_seo_registry_sha256 <<< "$manifest_identity"
          archive="dist/${manifest_archive}"
          test -f "$archive"
          unzip -t "$archive"
          actual="$(sha256sum "$archive" | cut -d' ' -f1)"
          [[ "$expected" == "$actual" ]]
          actual_requirements_sha256="$(unzip -p "$archive" "$manifest_requirements" | sha256sum | cut -d' ' -f1)"
          [[ "$expected_requirements_sha256" == "$actual_requirements_sha256" ]] || { echo "Packaged release requirements do not match the manifest." >&2; exit 1; }
          source_requirements_sha256="$(sha256sum theme/tra-vel-v2/release-requirements.json | cut -d' ' -f1)"
          [[ "$expected_requirements_sha256" == "$source_requirements_sha256" ]] || { echo "Packaged release requirements do not match the checked-out source." >&2; exit 1; }
          actual_seo_registry_sha256="$(unzip -p "$archive" "$manifest_seo_registry" | sha256sum | cut -d' ' -f1)"
          [[ "$expected_seo_registry_sha256" == "$actual_seo_registry_sha256" ]] || { echo "Packaged SEO registry does not match the manifest." >&2; exit 1; }
          source_seo_registry_sha256="$(sha256sum content/seo/content-opportunity-registry.json | cut -d' ' -f1)"
          [[ "$expected_seo_registry_sha256" == "$source_seo_registry_sha256" ]] || { echo "Packaged SEO registry does not match the checked-out source." >&2; exit 1; }
          echo "Verified packaged theme ${manifest_version} at ${expected}."

      - name: Report dry run
        if: ${{ env.DRY_RUN == 'true' }}
        run: |
          echo "Dry run passed for production."
          cat dist/manifest.json

      - name: Validate production gate
        if: ${{ env.DRY_RUN != 'true' }}
        shell: bash
        env:
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          set -euo pipefail
          [[ "$DEPLOY_ENABLED" == "true" ]] || { echo "DEPLOY_ENABLED must be true in the production environment." >&2; exit 1; }
          [[ "$GITHUB_REF_NAME" == "main" ]] || { echo "Production uploads are allowed only from main." >&2; exit 1; }
          [[ "$DEPLOYMENT_CONFIRMATION" == "DEPLOY TRA-VEL V2" ]] || { echo "Deployment confirmation did not match." >&2; exit 1; }
          [[ "$WP_SITE_URL" =~ ^https:// ]] || { echo "WP_SITE_URL must use HTTPS." >&2; exit 1; }
          [[ -n "$WP_USERNAME" && -n "$WP_APP_PASSWORD" ]] || { echo "WordPress deployment secrets are missing." >&2; exit 1; }
          [[ "$ACTIVATE_THEME" == "false" ]] || { echo "Protected automatic-recovery deployments are upload-only because the current rollback endpoint cannot restore a different previously active theme." >&2; exit 1; }

      - name: Verify live dependencies and missing-route semantics
        if: ${{ env.DRY_RUN != 'true' }}
        shell: bash
        run: python3 scripts/ci/verify_theme_preflight.py --requirements "$THEME_RELEASE_REQUIREMENTS_FILE" --site-url "$WP_SITE_URL"

      - name: Upload isolated theme through WordPress REST
        id: deploy_theme
        if: ${{ env.DRY_RUN != 'true' }}
        shell: bash
        env:
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          set -euo pipefail
          manifest_archive="$(python3 -c 'import json; print(json.load(open("dist/manifest.json", encoding="utf-8"))["archive"])')"
          archive="dist/${manifest_archive}"
          bash scripts/deploy/deploy-theme.sh "$archive"

      - name: Capture deployment receipt identity
        id: deployment_receipt
        if: ${{ env.DRY_RUN != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - "$THEME_DEPLOY_RESULT_FILE" "$GITHUB_OUTPUT" <<'PY'
          import json
          import re
          import sys
          data = json.load(open(sys.argv[1], encoding="utf-8"))
          backup = data.get("backup") or ""
          if backup and not re.fullmatch(r"tra-vel-v2-\d{8}T\d{6}Z-[A-Za-z0-9]+", backup):
              raise SystemExit("Deployment returned an invalid rollback identifier.")
          content_sha256 = str(data.get("content_sha256", ""))
          if not re.fullmatch(r"[a-f0-9]{64}", content_sha256):
              raise SystemExit("Deployment returned an invalid installed content fingerprint.")
          backup_content_sha256 = str(data.get("backup_content_sha256") or "")
          if backup and not re.fullmatch(r"[a-f0-9]{64}", backup_content_sha256):
              raise SystemExit("Deployment returned an invalid backup content fingerprint.")
          with open(sys.argv[2], "a", encoding="utf-8") as output:
              output.write(f"version={data['version']}\n")
              output.write(f"sha256={data['sha256']}\n")
              output.write(f"content_sha256={content_sha256}\n")
              output.write(f"backup={backup}\n")
              output.write(f"backup_content_sha256={backup_content_sha256}\n")
              output.write(f"unchanged={str(data.get('unchanged') is True).lower()}\n")
          PY

      - name: Verify deployed identity and website, or restore exact backup
        if: ${{ always() && !cancelled() && env.DRY_RUN != 'true' && steps.deploy_theme.outcome != 'skipped' }}
        shell: bash
        env:
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          set -uo pipefail
          verified=false
          identity_verified=false
          verification_budget_seconds=360
          verification_started=$SECONDS
          if bash scripts/deploy/get-theme-status.sh theme-status.json \
            && python3 - <<'PY'
          import json
          import os
          import re

          def require(condition, message):
              if not condition:
                  raise SystemExit(message)

          manifest = json.load(open("dist/manifest.json", encoding="utf-8"))
          deployed = json.load(open("theme-deploy-result.json", encoding="utf-8"))
          prestate = json.load(open("theme-deploy-prestate.json", encoding="utf-8"))
          status = json.load(open("theme-status.json", encoding="utf-8"))

          require(manifest.get("theme") == "tra-vel-v2", "Manifest theme identity mismatch.")
          require(bool(re.fullmatch(r"\d+\.\d+\.\d+(?:[-+][A-Za-z0-9.-]+)?", str(manifest.get("version", "")))), "Manifest version is invalid.")
          require(bool(re.fullmatch(r"[a-f0-9]{64}", str(manifest.get("sha256", "")))), "Manifest checksum is invalid.")
          require(prestate.get("theme") == manifest["theme"], "Pre-deployment theme identity mismatch.")
          require(bool(re.fullmatch(r"\d+\.\d+\.\d+(?:[-+][A-Za-z0-9.-]+)?", str(prestate.get("gateway_version", "")))), "Pre-deployment gateway version is invalid.")
          require(prestate.get("installed") is True, "Pre-deployment theme was not installed.")
          require(bool(re.fullmatch(r"\d+\.\d+\.\d+(?:[-+][A-Za-z0-9.-]+)?", str(prestate.get("installed_version", "")))), "Pre-deployment version is invalid.")
          require(bool(re.fullmatch(r"[a-f0-9]{64}", str(prestate.get("installed_fingerprint", "")))), "Pre-deployment content fingerprint is invalid.")
          require(isinstance(prestate.get("active"), bool), "Pre-deployment active state is invalid.")
          require(deployed.get("ok") is True, "Deployment receipt is not successful.")
          require(deployed.get("theme") == manifest["theme"], "Deployment receipt theme mismatch.")
          require(deployed.get("version") == manifest["version"], "Deployment receipt version mismatch.")
          require(deployed.get("sha256") == manifest["sha256"], "Deployment receipt checksum mismatch.")
          require(bool(re.fullmatch(r"[a-f0-9]{64}", str(deployed.get("content_sha256", "")))), "Deployment receipt content fingerprint is invalid.")
          require(status.get("theme") == manifest["theme"], "Remote theme identity mismatch.")
          require(status.get("gateway_version") == prestate["gateway_version"], "Deployment gateway identity changed during the release.")
          require(status.get("installed") is True, "Remote theme is not installed.")
          require(status.get("installed_version") == manifest["version"], "Remote installed version mismatch.")
          require(status.get("installed_fingerprint") == deployed["content_sha256"], "Remote installed content fingerprint mismatch.")
          require(status.get("active") is deployed.get("active"), "Remote active state differs from the deployment receipt.")
          require(status.get("active") is prestate["active"], "Upload-only deployment changed active state.")

          backup = deployed.get("backup") or ""
          backup_content = deployed.get("backup_content_sha256") or ""
          if backup:
              require(bool(re.fullmatch(r"tra-vel-v2-\d{8}T\d{6}Z-[A-Za-z0-9]+", backup)), "Deployment backup identifier is invalid.")
              require(backup in status.get("backups", []), "Deployment backup is not listed remotely.")
              require(backup_content == prestate["installed_fingerprint"], "Deployment backup content differs from prestate.")

          unchanged = deployed.get("unchanged") is True
          if unchanged:
              require(not backup, "Unchanged deployment unexpectedly returned a backup.")
              require(not backup_content, "Unchanged deployment unexpectedly returned backup content identity.")
              require(prestate["installed_version"] == manifest["version"], "Unchanged deployment version differs from prestate.")
          else:
              require(bool(backup), "Changed deployment did not return a backup.")
              require(prestate["installed_version"] != manifest["version"], "Changed deployment did not advance installed version.")
              last = status.get("last_deployment")
              require(isinstance(last, dict), "Remote last deployment is missing.")
              require(last.get("version") == manifest["version"], "Remote last deployment version mismatch.")
              require(last.get("sha256") == manifest["sha256"], "Remote last deployment checksum mismatch.")
              require(last.get("content_sha256") == deployed["content_sha256"], "Remote last deployment content fingerprint mismatch.")
              require((last.get("backup") or "") == backup, "Remote last deployment backup mismatch.")
              require(last.get("backup_content_sha256") == backup_content, "Remote last deployment backup content mismatch.")

          if os.environ.get("ACTIVATE_THEME") == "true":
              require(deployed.get("active") is True and status.get("active") is True, "Requested activation was not observed.")

          print(f"Verified deployed theme {manifest['version']} at {manifest['sha256']}; backup={backup or 'none'}")
          PY
          then
            identity_verified=true
          fi

          verification_elapsed=$((SECONDS - verification_started))
          verification_remaining=$((verification_budget_seconds - verification_elapsed))
          if [[ "$identity_verified" == "true" && "$verification_remaining" -gt 0 ]]; then
            expected_theme_version="$(python3 -c 'import json; print(json.load(open("dist/manifest.json", encoding="utf-8"))["version"])')"
            if timeout --signal=TERM --kill-after=5s "${verification_remaining}s" \
              env EXPECTED_THEME_VERSION="$expected_theme_version" \
              bash scripts/deploy/smoke-test.sh "$WP_SITE_URL"; then
              verified=true
            else
              echo "Post-deploy route verification failed or exceeded the remaining ${verification_remaining}s verification budget; starting recovery checks." >&2
            fi
          elif [[ "$identity_verified" == "true" ]]; then
            echo "Post-deploy identity verification exhausted the ${verification_budget_seconds}s verification budget; starting recovery checks without route smoke." >&2
          fi

          if [[ "$verified" != "true" ]]; then
            if ! bash scripts/deploy/get-theme-status.sh theme-recovery-status.json; then
              echo "Post-deploy verification failed and current remote identity could not be rechecked; refusing an ambiguous rollback." >&2
              exit 1
            fi

            if ! python3 - <<'PY' > theme-recovery.txt
          import json
          from pathlib import Path
          import re

          def require(condition, message):
              if not condition:
                  raise SystemExit(message)

          manifest = json.load(open("dist/manifest.json", encoding="utf-8"))
          prestate = json.load(open("theme-deploy-prestate.json", encoding="utf-8"))
          status = json.load(open("theme-recovery-status.json", encoding="utf-8"))
          backup_pattern = r"tra-vel-v2-\d{8}T\d{6}Z-[A-Za-z0-9]+"

          require(manifest.get("theme") == "tra-vel-v2", "Manifest theme identity mismatch.")
          require(bool(re.fullmatch(r"\d+\.\d+\.\d+(?:[-+][A-Za-z0-9.-]+)?", str(manifest.get("version", "")))), "Manifest version is invalid.")
          require(bool(re.fullmatch(r"[a-f0-9]{64}", str(manifest.get("sha256", "")))), "Manifest checksum is invalid.")
          require(prestate.get("theme") == manifest["theme"], "Pre-deployment theme identity mismatch.")
          require(prestate.get("installed") is True, "Pre-deployment theme was not installed.")
          require(bool(re.fullmatch(r"\d+\.\d+\.\d+(?:[-+][A-Za-z0-9.-]+)?", str(prestate.get("installed_version", "")))), "Pre-deployment version is invalid.")
          require(bool(re.fullmatch(r"[a-f0-9]{64}", str(prestate.get("installed_fingerprint", "")))), "Pre-deployment content fingerprint is invalid.")
          require(isinstance(prestate.get("active"), bool), "Pre-deployment active state is invalid.")

          last = status.get("last_deployment")
          last = last if isinstance(last, dict) else {}
          last_backup = last.get("backup") or ""
          last_content = str(last.get("content_sha256", ""))
          last_backup_content = str(last.get("backup_content_sha256", ""))

          receipt = None
          receipt_path = Path("theme-deploy-result.json")
          if receipt_path.is_file():
              try:
                  candidate = json.load(open(receipt_path, encoding="utf-8"))
                  if (
                      candidate.get("ok") is True
                      and candidate.get("theme") == manifest["theme"]
                      and candidate.get("version") == manifest["version"]
                      and candidate.get("sha256") == manifest["sha256"]
                      and bool(re.fullmatch(r"[a-f0-9]{64}", str(candidate.get("content_sha256", ""))))
                      and isinstance(candidate.get("active"), bool)
                      and isinstance(candidate.get("unchanged"), bool)
                  ):
                      receipt = candidate
              except (OSError, ValueError, TypeError):
                  receipt = None

          unchanged = bool(receipt and receipt["unchanged"] is True)
          receipt_backup = (receipt.get("backup") or "") if receipt else ""
          receipt_backup_content = str(receipt.get("backup_content_sha256") or "") if receipt else ""
          if receipt_backup and not re.fullmatch(backup_pattern, receipt_backup):
              raise SystemExit("Deployment returned an invalid rollback identifier.")
          if unchanged and (receipt_backup or receipt_backup_content):
              raise SystemExit("An unchanged deployment cannot name mutation backup content.")
          if receipt_backup and receipt_backup_content != prestate["installed_fingerprint"]:
              raise SystemExit("Deployment backup content differs from prestate.")

          backup = receipt_backup or last_backup
          expected_content = str(receipt.get("content_sha256", "")) if receipt else last_content
          post_matches = (
              status.get("theme") == manifest["theme"]
              and status.get("installed") is True
              and status.get("installed_version") == manifest["version"]
              and status.get("installed_fingerprint") == expected_content
              and status.get("active") is prestate["active"]
          )
          last_matches = (
              last.get("version") == manifest["version"]
              and last.get("sha256") == manifest["sha256"]
              and last_content == expected_content
              and bool(re.fullmatch(r"[a-f0-9]{64}", expected_content))
              and bool(re.fullmatch(backup_pattern, last_backup))
              and last_backup_content == prestate["installed_fingerprint"]
              and last_backup in status.get("backups", [])
          )
          mutation_evidence = (
              not unchanged
              and prestate["installed_version"] != manifest["version"]
              and post_matches
              and last_matches
              and backup == last_backup
          )
          print(f"{backup if mutation_evidence else ''}|{str(unchanged).lower()}|{str(mutation_evidence).lower()}|{expected_content if mutation_evidence else ''}|{prestate['installed_fingerprint'] if mutation_evidence else ''}")
          PY
            then
              echo "Post-deploy verification failed and pre/post release identity could not be validated; refusing an ambiguous rollback." >&2
              exit 1
            fi

            IFS='|' read -r backup unchanged mutation_evidence expected_current_fingerprint expected_restored_fingerprint < theme-recovery.txt
            if [[ "$mutation_evidence" == "true" && -n "$backup" && "$expected_current_fingerprint" =~ ^[a-f0-9]{64}$ && "$expected_restored_fingerprint" =~ ^[a-f0-9]{64}$ ]]; then
              if ! bash scripts/deploy/get-theme-status.sh theme-rollback-guard.json \
                || ! python3 - "$backup" "$expected_current_fingerprint" "$expected_restored_fingerprint" <<'PY'
          import json
          import re
          import sys
          def require(condition, message):
              if not condition:
                  raise SystemExit(message)
          manifest = json.load(open("dist/manifest.json", encoding="utf-8"))
          prestate = json.load(open("theme-deploy-prestate.json", encoding="utf-8"))
          status = json.load(open("theme-rollback-guard.json", encoding="utf-8"))
          backup = sys.argv[1]
          expected_current_fingerprint = sys.argv[2]
          expected_restored_fingerprint = sys.argv[3]
          require(bool(re.fullmatch(r"tra-vel-v2-\d{8}T\d{6}Z-[A-Za-z0-9]+", backup)), "Rollback backup identifier is invalid.")
          require(bool(re.fullmatch(r"[a-f0-9]{64}", expected_current_fingerprint)), "Expected current content fingerprint is invalid.")
          require(expected_restored_fingerprint == prestate["installed_fingerprint"], "Expected restored content fingerprint differs from prestate.")
          require(status.get("theme") == manifest["theme"], "Remote theme changed before rollback.")
          require(status.get("installed") is True, "Remote theme disappeared before rollback.")
          require(status.get("installed_version") == manifest["version"], "Remote version changed before rollback.")
          require(status.get("installed_fingerprint") == expected_current_fingerprint, "Remote content changed before rollback.")
          require(status.get("active") is prestate["active"], "Remote active state changed before rollback.")
          require(backup in status.get("backups", []), "Rollback backup is no longer listed.")
          last = status.get("last_deployment")
          require(isinstance(last, dict), "Remote deployment identity is missing before rollback.")
          require(last.get("version") == manifest["version"], "Remote deployment version changed before rollback.")
          require(last.get("sha256") == manifest["sha256"], "Remote deployment checksum changed before rollback.")
          require(last.get("content_sha256") == expected_current_fingerprint, "Remote deployment content changed before rollback.")
          require(last.get("backup") == backup, "Remote deployment backup changed before rollback.")
          require(last.get("backup_content_sha256") == expected_restored_fingerprint, "Remote deployment backup content changed before rollback.")
          PY
              then
                echo "Remote release identity changed before rollback; refusing to overwrite a later deployment." >&2
                exit 1
              fi

              echo "Post-deploy verification failed; restoring the exact captured backup ${backup}." >&2
              export ROLLBACK_CONFIRMATION="ROLLBACK TRA-VEL V2"
              export EXPECTED_CURRENT_FINGERPRINT="$expected_current_fingerprint"
              export EXPECTED_RESTORED_FINGERPRINT="$expected_restored_fingerprint"
              if ! bash scripts/deploy/rollback-theme.sh "$backup"; then
                echo "Automatic rollback failed and requires immediate operator attention." >&2
                exit 1
              fi
              if ! bash scripts/deploy/get-theme-status.sh theme-rollback-status.json \
                || ! python3 - "$backup" <<'PY'
          import json
          import sys
          def require(condition, message):
              if not condition:
                  raise SystemExit(message)
          prestate = json.load(open("theme-deploy-prestate.json", encoding="utf-8"))
          status = json.load(open("theme-rollback-status.json", encoding="utf-8"))
          backup = sys.argv[1]
          require(status.get("theme") == prestate["theme"], "Restored theme identity mismatch.")
          require(status.get("installed") is True, "Restored theme is not installed.")
          require(status.get("installed_version") == prestate["installed_version"], "Restored version does not match prestate.")
          require(status.get("installed_fingerprint") == prestate["installed_fingerprint"], "Restored content fingerprint does not match prestate.")
          require(status.get("active") is prestate["active"], "Restored active state does not match prestate.")
          last = status.get("last_deployment")
          require(isinstance(last, dict), "Rollback status record is missing.")
          require(last.get("backup") == backup, "Rollback status backup mismatch.")
          require(last.get("version") == prestate["installed_version"], "Rollback status version mismatch.")
          require(last.get("content_sha256") == prestate["installed_fingerprint"], "Rollback status content fingerprint mismatch.")
          PY
              then
                echo "The rollback endpoint returned success, but the restored release identity did not match pre-deployment state." >&2
                exit 1
              fi
              restored_theme_version="$(python3 -c 'import json; print(json.load(open("theme-deploy-prestate.json", encoding="utf-8"))["installed_version"])')"
              if ! timeout --signal=TERM --kill-after=5s 360s \
                env ALLOW_LEGACY_RELEASE_MARKER=true EXPECTED_THEME_VERSION="$restored_theme_version" \
                bash scripts/deploy/smoke-test.sh "$WP_SITE_URL"; then
                echo "The exact backup was restored and identity-verified, but the post-rollback smoke test still failed." >&2
                exit 1
              fi
            elif [[ "$unchanged" == "true" ]]; then
              echo "Post-deploy verification failed after an idempotent no-change response; no mutation was made, so rollback was intentionally skipped." >&2
            else
              echo "Post-deploy verification failed without proof that this run changed the remote release; rollback was safely withheld." >&2
            fi
            exit 1
          fi

      - name: Preserve deployment receipt
        if: ${{ always() && !cancelled() && env.DRY_RUN != 'true' && hashFiles('theme-deploy-prestate.json') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: tra-vel-v2-deploy-receipt-${{ github.run_id }}
          path: |
            theme-deploy-prestate.json
            theme-deploy-result.json
          if-no-files-found: error
          retention-days: 90

      - name: Publish deployment summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Tra-Vel V2 deployment"
            echo "- Revision: ${GITHUB_SHA}"
            echo "- Dry run: ${DRY_RUN}"
            echo "- Activation requested: ${ACTIVATE_THEME:-false}"
            echo "- Site: ${WP_SITE_URL:-not configured}"
            echo "- Deployed version: ${{ steps.deployment_receipt.outputs.version || 'not deployed' }}"
            echo "- Deployed SHA-256: ${{ steps.deployment_receipt.outputs.sha256 || 'not deployed' }}"
            echo "- Installed content fingerprint: ${{ steps.deployment_receipt.outputs.content_sha256 || 'not deployed' }}"
            echo "- Captured rollback backup: ${{ steps.deployment_receipt.outputs.backup || 'none' }}"
          } >> "$GITHUB_STEP_SUMMARY"
